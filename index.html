<!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surface Level Pressure Washing — Book a Job</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --concrete-dark:#33393a;
--concrete:#4a5153;
--concrete-line:#6b7375;
--pavement:#f3f1ea;
  --white:#ffffff;
  --spray:#0091c7;
--spray-bright:#00b6f0;
--amber:#d98a2b;
  --good:#3f8f5f;
--danger:#b8493f;
  --shadow: 0 8px 24px rgba(0,0,0,0.12);
}
*{box-sizing:border-box;}
body{
  margin:0;
font-family:'Inter',sans-serif;
background:var(--pavement);
color:var(--concrete-dark);
background-image:
radial-gradient(circle at 1px 1px, rgba(74,81,83,0.08) 1px, transparent 0);
background-size:22px 22px;
}
h1,h2,h3,.disp{ font-family:'Barlow Condensed',sans-serif; font-weight:800; text-transform:uppercase; letter-spacing:0.02em;}
.mono{ font-family:'IBM Plex Mono',monospace; }

header{
  background:var(--concrete-dark);
color:var(--white);
padding:18px 24px;
display:flex;
align-items:center;
justify-content:space-between;
position:relative;
overflow:hidden;
flex-wrap:wrap;
gap:10px;
}
.brand{ display:flex; align-items:center; gap:12px; z-index:2;}
.brand-mark{
  width:38px;height:38px;border-radius:6px;
background:linear-gradient(135deg,var(--spray-bright),var(--spray));
display:flex;align-items:center;justify-content:center;
box-shadow:0 0 0 3px rgba(0,182,240,0.2);
}
.brand-mark svg{width:22px;height:22px;}
.brand-name{ font-size:26px; line-height:1; }
.brand-sub{ font-family:'Inter',sans-serif; font-size:11px; letter-spacing:0.12em; color:#9fa7a8; text-transform:uppercase; margin-top:2px;}
nav{ display:flex; gap:8px; flex-wrap:wrap; }
nav button{
  background:none;border:1px solid #5b6264;color:#dfe3e3;
  padding:8px 16px;border-radius:999px;font-size:13px;font-weight:600;
cursor:pointer; font-family:'Inter',sans-serif;
transition:all .15s ease;
z-index:2;
}
nav button:hover{ border-color:var(--spray-bright); color:var(--white); }
nav button.active{ background:var(--spray-bright); color:var(--concrete-dark); border-color:var(--spray-bright);}

.sweep{
  position:absolute; inset:0;
background:repeating-linear-gradient(115deg, rgba(255,255,255,0.05) 0 2px, transparent 2px 26px);
animation: sweepmove 6s linear infinite;
pointer-events:none;
}
@keyframes sweepmove{ from{ transform:translateX(-60px);} to{ transform:translateX(0px);} }

main{ max-width:980px; margin:0 auto; padding:28px 20px 80px; }

.hero{
  background:var(--concrete-dark);
border-radius:14px;
padding:40px 32px;
color:var(--white);
margin-bottom:28px;
position:relative;
overflow:hidden;
}
.hero h1{ font-size:44px; margin:0 0 8px; color:var(--white); max-width:600px;}
.hero p{ font-family:'Inter',sans-serif; color:#c9cfd0; max-width:480px; font-size:15px; margin:0;}
.hero .accent{ color:var(--spray-bright); }
.gauge{
  position:absolute; right:-30px; top:50%; transform:translateY(-50%);
width:220px; height:220px; opacity:0.9;
}
.area-badge{
  display:inline-flex; align-items:center; gap:8px;
margin-top:18px; padding:8px 16px; border-radius:999px;
border:1px solid rgba(0,182,240,0.5); background:rgba(0,182,240,0.08);
font-family:'IBM Plex Mono',monospace; font-size:12px; color:#a9e8f9;
letter-spacing:0.02em; position:relative; z-index:2;
}
.area-badge .dot{ width:7px;height:7px;border-radius:50%; background:var(--spray-bright); flex:0 0 auto;}

.step-label{
  display:flex; align-items:center; gap:10px; margin:34px 0 14px;
}
.step-num{
  font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:13px;
background:var(--concrete-dark); color:var(--spray-bright);
width:26px;height:26px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
}
.step-label h2{ font-size:22px; margin:0; color:var(--concrete-dark);}

.services{ display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px;}
.svc-card{
  background:var(--white); border:2px solid transparent; border-radius:12px;
padding:18px; cursor:pointer; box-shadow:var(--shadow);
transition:border-color .15s ease, transform .15s ease;
position:relative;
}
.svc-card:hover{ transform:translateY(-2px); }
.svc-card.selected{ border-color:var(--spray-bright); }
.svc-card.selected::after{
  content:"✓"; position:absolute; top:12px; right:12px;
width:22px;height:22px;border-radius:50%; background:var(--spray-bright); color:var(--concrete-dark);
font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center;
}
.svc-card.custom-card{ border:2px dashed var(--concrete-line); background:#fbfaf6; }
.svc-card.custom-card.selected{ border-style:solid; border-color:var(--spray-bright); }
.svc-name{ font-size:20px; margin:0 0 4px; }
.svc-desc{ font-size:13px; color:#666; margin:0 0 14px; line-height:1.4; min-height:36px;}
.svc-foot{ display:flex; justify-content:space-between; align-items:baseline; }
.svc-price{ font-family:'IBM Plex Mono',monospace; font-size:22px; font-weight:600; color:var(--spray); }
.svc-dur{ font-size:11px; color:#888; text-transform:uppercase; letter-spacing:0.05em;}

.chip{ display:inline-flex; align-items:center; gap:6px; background:#e8f8fd; border-radius:999px; padding:6px 12px; font-size:13px; margin:0 8px 8px 0;}
.chip button{ background:none;border:none;color:var(--danger);cursor:pointer;font-weight:700; font-size:14px; line-height:1;}

.day-strip{ display:flex; gap:8px; overflow-x:auto; padding-bottom:6px;}
.day-chip{
  flex:0 0 auto; background:var(--white); border:2px solid #e2e0d8; border-radius:10px;
padding:10px 14px; text-align:center; cursor:pointer; min-width:64px;
}
.day-chip .dow{ font-size:11px; color:#999; text-transform:uppercase; font-weight:600;}
.day-chip .dom{ font-family:'IBM Plex Mono',monospace; font-size:18px; font-weight:600;}
.day-chip.selected{ border-color:var(--spray-bright); background:#e8f8fd;}
.day-chip.closed{ opacity:0.35; cursor:not-allowed; }

.slot-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:8px; margin-top:14px;}
.slot-btn{
  font-family:'IBM Plex Mono',monospace; font-size:14px; font-weight:600;
background:var(--white); border:2px solid #e2e0d8; border-radius:8px;
padding:10px 6px; cursor:pointer; text-align:center;
                  }
.slot-btn:hover{ border-color:var(--spray-bright); }
.slot-btn.selected{ background:var(--spray-bright); border-color:var(--spray-bright); color:var(--concrete-dark);}
.empty-note{ font-size:13px; color:#888; padding:10px 0; }

.form-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-grid .full{ grid-column:1/-1; }
label{ font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.04em; color:#666; display:block; margin-bottom:4px;}
input[type=text],input[type=email],input[type=tel],input[type=date],input[type=time],textarea,select{
  width:100%; padding:10px 12px; border:2px solid #e2e0d8; border-radius:8px; font-family:'Inter',sans-serif; font-size:14px;
background:var(--white);
}
input:focus,textarea:focus,select:focus{ outline:none; border-color:var(--spray-bright);}
textarea{ min-height:70px; resize:vertical;}

.summary-box{
  background:var(--white); border-radius:12px; padding:20px; box-shadow:var(--shadow); margin-top:16px;
}
.summary-row{ display:flex; justify-content:space-between; padding:6px 0; font-size:14px; border-bottom:1px dashed #e2e0d8;}
.summary-row.total{ font-weight:700; font-size:18px; border-bottom:none; padding-top:12px; }
.btn{
  border:none; border-radius:999px; padding:13px 26px; font-weight:700; font-size:15px; cursor:pointer;
font-family:'Inter',sans-serif;
}
.btn-primary{ background:var(--spray-bright); color:var(--concrete-dark); }
.btn-primary:hover{ background:var(--spray); color:var(--white); }
.btn-primary:disabled{ background:#ccc; color:#888; cursor:not-allowed; }
.btn-ghost{ background:none; border:2px solid var(--concrete-line); color:var(--concrete-dark); }
.btn-danger{ background:none; border:2px solid var(--danger); color:var(--danger); padding:7px 14px; font-size:12px; border-radius:8px;}
.btn-row{ display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; }
a.btn{ text-decoration:none; display:inline-block; }

.demo-note{ background:#fdf1de; border:1px solid #f0d19b; color:#8a5a12; font-size:12px; padding:10px 14px; border-radius:8px; margin-top:12px; line-height:1.5;}

  .confirm-box{ text-align:center; background:var(--white); border-radius:14px; padding:44px 30px; box-shadow:var(--shadow);}
.confirm-icon{ width:64px;height:64px; margin:0 auto 14px; }

.contact-box{ text-align:center; background:var(--white); border-radius:14px; padding:40px 30px; box-shadow:var(--shadow); max-width:440px; margin:0 auto;}
.contact-box .eyebrow{ font-size:12px; color:#777; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px;}
.contact-box .email{ font-family:'IBM Plex Mono',monospace; font-size:24px; margin:0 0 20px; word-break:break-all;}

.admin-card{ background:var(--white); border-radius:12px; padding:20px; box-shadow:var(--shadow); margin-bottom:20px;}
.admin-card h3{ margin-top:0; font-size:20px;}
.hours-row{ display:grid; grid-template-columns:90px 90px 1fr 1fr; gap:10px; align-items:center; padding:6px 0; font-size:13px;}
.toggle{ position:relative; width:42px;height:24px; }
.toggle input{ opacity:0; width:0;height:0; }
.toggle .slider{ position:absolute;inset:0;background:#ccc;border-radius:999px; cursor:pointer; transition:.2s;}
.toggle .slider:before{ content:""; position:absolute; width:18px;height:18px; left:3px;top:3px; background:white;border-radius:50%; transition:.2s;}
.toggle input:checked + .slider{ background:var(--good); }
.toggle input:checked + .slider:before{ transform:translateX(18px); }

.svc-edit-row{ display:grid; grid-template-columns:1.2fr 2fr 0.8fr 0.7fr 1.4fr auto; gap:8px; align-items:center; padding:8px 0; border-bottom:1px solid #eee; font-size:13px;}
.blocked-chip{ display:inline-flex; align-items:center; gap:6px; background:#f3ebe4; border-radius:999px; padding:5px 12px; font-size:12px; margin:4px 6px 0 0;}
.blocked-chip button{ background:none;border:none;color:var(--danger);cursor:pointer;font-weight:700;}

table.bookings{ width:100%; border-collapse:collapse; font-size:13px;}
table.bookings th{ text-align:left; text-transform:uppercase; font-size:11px; color:#888; padding:8px 6px; border-bottom:2px solid #eee;}
table.bookings td{ padding:8px 6px; border-bottom:1px solid #f0f0f0; vertical-align:top;}
.status-pill{ font-size:11px; padding:3px 9px; border-radius:999px; font-weight:600; text-transform:uppercase;}
.status-confirmed{ background:#e3f3e8; color:var(--good); }
  .status-pending{ background:#fdf1de; color:var(--amber); }
  .status-cancelled{ background:#f7e6e4; color:var(--danger); }

  .pin-gate{ max-width:340px; margin:60px auto; text-align:center; background:var(--white); padding:30px; border-radius:14px; box-shadow:var(--shadow);}
.pin-gate input{ text-align:center; letter-spacing:6px; font-size:20px; font-family:'IBM Plex Mono',monospace;}

footer{ text-align:center; padding:20px; font-size:12px; color:#999; }
@media(max-width:640px){
.hero h1{ font-size:32px;} .gauge{ display:none; }
.form-grid{ grid-template-columns:1fr; }
.svc-edit-row{ grid-template-columns:1fr; }
.hours-row{ grid-template-columns:70px 70px 1fr 1fr; font-size:12px;}
}
</style>
  </head>
  <body>
  <header>
  <div class="sweep"></div>
  <div class="brand">
  <div class="brand-mark">
  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C12 2 6 9 6 14a6 6 0 0012 0c0-5-6-12-6-12z" fill="white"/></svg>
  </div>
  <div>
  <div class="brand-name">Surface Level</div>
  <div class="brand-sub">Pressure Washing</div>
  </div>
  </div>
  <nav>
  <button id="nav-book" class="active" onclick="setView('book')">Book a Job</button>
  <button id="nav-contact" onclick="setView('contact')">Contact</button>
  <button id="nav-admin" onclick="setView('admin')">Business Dashboard</button>
  </nav>
  </header>

  <main id="app"></main>
  <footer>Built for Surface Level Pressure Washing · exterior surfaces only · Thompson's Station · Spring Hill · Franklin, TN</footer>

  <script>
  let DATA = { services: [], hours: {}, blocked: [], bookings: [], pin: null, customRequests: [] };
let state = {
view: 'book',
  selectedServiceIds: [],
  customMode: false,
  selectedDate: null,
  selectedSlot: null,
  form: { name:'', phone:'', email:'', address:'', notes:'' },
customForm: { description:'', location:'', preferredDate:'', preferredTime:'', name:'', phone:'', email:'' },
  lastBooking: null,
  lastCustomRequest: null,
  admin: { unlocked:false, pinInput:'', newPinA:'', newPinB:'', newBlockDate:'' }
            };

const DAY_KEYS = ['sun','mon','tue','wed','thu','fri','sat'];
const DAY_LABELS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

const DEFAULT_SERVICES = [
{id:'driveway', name:'Driveway', desc:'Full driveway wash, oil-stain pre-treatment included.', price:140, duration:2, link:'https://www.paypal.com/ncp/payment/TGRGGSUECGZML'},
{id:'sidewalk', name:'Sidewalk', desc:'Walkways and paths, edge to edge.', price:80, duration:1, link:'https://www.paypal.com/ncp/payment/RJG4VNC5GA3FJ'},
{id:'curb', name:'Curb', desc:'Street-facing curb, tire marks and grime.', price:40, duration:1, link:'https://www.paypal.com/ncp/payment/57FK4ME7VNUUJ'},
{id:'fence', name:'Fence', desc:'Wood, vinyl, or metal fencing, priced per project.', price:150, duration:3, link:''}
];
const DEFAULT_HOURS = Object.fromEntries(DAY_KEYS.map(k=>[k,{open:true,start:'08:00',end:'17:00'}]));

async function loadData(){
DATA.services = await getJSON('pw:services', DEFAULT_SERVICES);
DATA.hours = await getJSON('pw:hours', DEFAULT_HOURS);
DATA.blocked = await getJSON('pw:blocked', []);
DATA.bookings = await getJSON('pw:bookings', []);
DATA.pin = await getJSON('pw:pin', null);
DATA.customRequests = await getJSON('pw:customRequests', []);
}
async function getJSON(key, fallback){
try{
const r = localStorage.getItem(key);
return r ? JSON.parse(r) : fallback;
}catch(e){ return fallback; }
}
async function setJSON(key, value){
try{ localStorage.setItem(key, JSON.stringify(value)); }catch(e){ console.error('storage set failed', key, e); }
}
async function saveServices(){ await setJSON('pw:services', DATA.services); }
async function saveHours(){ await setJSON('pw:hours', DATA.hours); }
async function saveBlocked(){ await setJSON('pw:blocked', DATA.blocked); }
async function saveBookings(){ await setJSON('pw:bookings', DATA.bookings); }
async function savePin(){ await setJSON('pw:pin', DATA.pin); }
async function saveCustomRequests(){ await setJSON('pw:customRequests', DATA.customRequests); }

function pad(n){ return n<10 ? '0'+n : ''+n; }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function fmtMoney(n){ return '$'+Number(n).toFixed(0); }
function fmtTimeMin(min){
let h = Math.floor(min/60), m = min%60;
const ap = h>=12 ? 'PM':'AM';
let h12 = h%12; if(h12===0) h12=12;
return h12+':'+pad(m)+' '+ap;
}
function timeStrToMin(t){ const [h,m]=t.split(':').map(Number); return h*60+m; }
function dateLabel(dateStr){
const d = new Date(dateStr+'T00:00:00');
return { dow: DAY_LABELS[d.getDay()], dom: d.getDate() };
}
function nextNDays(n){
const out=[]; const d=new Date();
for(let i=0;i<n;i++){
const dt=new Date(d); dt.setDate(d.getDate()+i);
out.push(dt.getFullYear()+'-'+pad(dt.getMonth()+1)+'-'+pad(dt.getDate()));
}
return out;
}
function getService(id){ return DATA.services.find(s=>s.id===id); }
function getSelectedServices(){ return state.selectedServiceIds.map(id=>getService(id)).filter(Boolean); }
function subtotalPrice(){ return getSelectedServices().reduce((a,s)=>a+s.price,0); }
function discountAmount(){ return getSelectedServices().length>1 ? 10 : 0; }
function totalPrice(){ return Math.max(0, subtotalPrice() - discountAmount()); }
function totalDuration(){ return getSelectedServices().reduce((a,s)=>a+s.duration,0); }
function serviceNames(ids){ return (ids||[]).map(id=>getService(id)?.name).filter(Boolean).join(' + '); }

function slotsForDate(dateStr, durationHours){
const dow = new Date(dateStr+'T00:00:00').getDay();
const h = DATA.hours[DAY_KEYS[dow]];
if(!h || !h.open) return [];
if(DATA.blocked.includes(dateStr)) return [];
const startMin = timeStrToMin(h.start), endMin = timeStrToMin(h.end);
const durMin = durationHours*60;
let slots = [];
for(let t=startMin; t+durMin<=endMin; t+=60){ slots.push(t); }
if(dateStr === todayStr()){
const now = new Date();
const nowMin = now.getHours()*60+now.getMinutes()+60;
slots = slots.filter(t=>t>=nowMin);
}
const dayBookings = DATA.bookings.filter(b=>b.date===dateStr && b.status!=='cancelled');
slots = slots.filter(t=>{
  const tEnd = t+durMin;
  return !dayBookings.some(b=>{
    const bEnd = b.timeMin + b.durationHours*60;
    return t < bEnd && b.timeMin < tEnd;
});
});
return slots;
}

function setView(v){
state.view = v;
document.getElementById('nav-book').classList.toggle('active', v==='book');
document.getElementById('nav-contact').classList.toggle('active', v==='contact');
document.getElementById('nav-admin').classList.toggle('active', v==='admin');
render();
}

function render(){
const app = document.getElementById('app');
if(state.view==='book') app.innerHTML = renderBook();
else if(state.view==='contact') app.innerHTML = renderContact();
else app.innerHTML = renderAdmin();
}

function renderBook(){
if(state.lastBooking) return renderConfirmation();
if(state.lastCustomRequest) return renderCustomConfirmation();

const selected = getSelectedServices();

let html = `
<div class="hero">
<svg class="gauge" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" stroke="#5b6264" stroke-width="6" fill="none"/><path d="M50 50 L74 30" stroke="#00b6f0" stroke-width="4" stroke-linecap="round"/><circle cx="50" cy="50" r="5" fill="#00b6f0"/></svg>
<h1>Clean concrete,<br><span class="accent">booked in minutes.</span></h1>
<p>Driveways, sidewalks, curbs, and fences — pick a service, grab an open slot on our schedule, and pay online.</p>
<div class="area-badge"><span class="dot"></span>Serving Thompson's Station, Spring Hill &amp; Franklin — Middle TN</div>
</div>

<div class="step-label"><div class="step-num">1</div><h2>Choose your service(s)</h2></div>
<div class="services">`;
DATA.services.forEach(s=>{
const isSel = state.selectedServiceIds.includes(s.id);
html += `<div class="svc-card ${isSel?'selected':''}" onclick="pickService('${s.id}')">
<h3 class="svc-name">${escapeHtml(s.name)}</h3>
<p class="svc-desc">${escapeHtml(s.desc)}</p>
<div class="svc-foot"><span class="svc-price">${fmtMoney(s.price)}</span><span class="svc-dur">${s.duration}${s.duration==1?' hr':' hrs'}</span></div>
</div>`;
});
html += `<div class="svc-card custom-card ${state.customMode?'selected':''}" onclick="toggleCustomMode()">
<h3 class="svc-name">Commercial / Custom Job</h3>
<p class="svc-desc">Bigger property, unusual surface, or something that doesn't fit a standard price? Tell us what you need and we'll follow up.</p>
<div class="svc-foot"><span class="svc-price" style="font-size:15px;">Get a quote</span><span class="svc-dur">by request</span></div>
</div>`;
html += `</div>`;

if(selected.length>0 && !state.customMode){
const disc = discountAmount();
html += `<div class="summary-box">
<div>${selected.map(s=>`<span class="chip">${escapeHtml(s.name)} · ${fmtMoney(s.price)}<button onclick="pickService('${s.id}')">&times;</button></span>`).join('')}</div>
${disc>0 ? `<div class="summary-row"><span>Subtotal</span><span>${fmtMoney(subtotalPrice())}</span></div>
<div class="summary-row" style="color:var(--good);"><span>Add-on discount</span><span>&minus;${fmtMoney(disc)}</span></div>` : ''}
<div class="summary-row total"><span>Total</span><span>${fmtMoney(totalPrice())} · ${totalDuration()} hr${totalDuration()==1?'':'s'}</span></div>
</div>`;
}

if(state.customMode){
html += renderCustomForm();
return html;
}

if(selected.length>0){
const totalDur = totalDuration();
html += `<div class="step-label"><div class="step-num">2</div><h2>Pick a day &amp; time</h2></div>`;
const days = nextNDays(21);
html += `<div class="day-strip">`;
days.forEach(d=>{
const dow = new Date(d+'T00:00:00').getDay();
const h = DATA.hours[DAY_KEYS[dow]];
const closed = !h?.open || DATA.blocked.includes(d);
const lbl = dateLabel(d);
html += `<div class="day-chip ${state.selectedDate===d?'selected':''} ${closed?'closed':''}" ${closed?'':`onclick="pickDate('${d}')"`}>
<div class="dow">${lbl.dow}</div><div class="dom">${lbl.dom}</div>
</div>`;
});
html += `</div>`;

if(state.selectedDate){
const slots = slotsForDate(state.selectedDate, totalDur);
if(slots.length===0){
html += `<p class="empty-note">No open slots this day for a ${totalDur}-hour job. Try another date, or remove a service.</p>`;
} else {
html += `<div class="slot-grid">`;
slots.forEach(t=>{
html += `<div class="slot-btn ${state.selectedSlot===t?'selected':''}" onclick="pickSlot(${t})">${fmtTimeMin(t)}</div>`;
});
html += `</div>`;
}
}
}

if(selected.length>0 && state.selectedDate && state.selectedSlot!=null){
html += `<div class="step-label"><div class="step-num">3</div><h2>Your details &amp; payment</h2></div>`;
html += `
<div class="form-grid">
<div><label>Full name</label><input type="text" value="${escapeAttr(state.form.name)}" oninput="updateForm('name',this.value)"></div>
<div><label>Phone</label><input type="tel" value="${escapeAttr(state.form.phone)}" oninput="updateForm('phone',this.value)"></div>
<div><label>Email</label><input type="email" value="${escapeAttr(state.form.email)}" oninput="updateForm('email',this.value)"></div>
<div><label>Property address</label><input type="text" value="${escapeAttr(state.form.address)}" oninput="updateForm('address',this.value)"></div>
<div class="full"><label>Notes (gate code, specific stains, etc.)</label><textarea oninput="updateForm('notes',this.value)">${escapeHtml(state.form.notes)}</textarea></div>
</div>

<div class="summary-box">
${selected.map(s=>`<div class="summary-row"><span>${escapeHtml(s.name)}</span><span>${fmtMoney(s.price)}</span></div>`).join('')}
${discountAmount()>0 ? `<div class="summary-row" style="color:var(--good);"><span>Add-on discount</span><span>&minus;${fmtMoney(discountAmount())}</span></div>` : ''}
<div class="summary-row"><span>Date &amp; time</span><span>${dateLabel(state.selectedDate).dow} ${dateLabel(state.selectedDate).dom} · ${fmtTimeMin(state.selectedSlot)}</span></div>
<div class="summary-row total"><span>Total due</span><span>${fmtMoney(totalPrice())}</span></div>
${renderPayArea()}
</div>`;
}

return html;
}

function renderPayArea(){
const selected = getSelectedServices();
const total = totalPrice();
const ready = state.form.name && state.form.phone && state.form.address;
const anyLinkConfigured = DATA.services.some(s=>s.link);

if(selected.length===1 && selected[0].link){
return `
<div class="btn-row"><button class="btn btn-primary" ${ready?'':'disabled'} onclick="payViaLink()">Pay ${fmtMoney(total)} &amp; Book</button></div>
<div class="demo-note">Opens our secure payment page in a new tab. Your slot is confirmed once payment goes through.</div>`;
}
if(selected.length>1 && anyLinkConfigured){
return `
<div class="btn-row"><button class="btn btn-primary" ${ready?'':'disabled'} onclick="requestPaymentLink()">Hold Slot &amp; Request Payment Link</button></div>
<div class="demo-note">Your slot is held for this time. Since you've combined more than one service, we'll send a payment link for the exact total (${fmtMoney(total)}) once we confirm.</div>`;
}
return `
<div class="btn-row"><button class="btn btn-primary" ${ready?'':'disabled'} onclick="payDemo()">Pay ${fmtMoney(total)} &amp; Book</button></div>
<div class="demo-note">Demo checkout — no card processor is connected for this yet, so no real charge happens.</div>`;
}

function renderConfirmation(){
const b = state.lastBooking;
return `
<div class="confirm-box">
<svg class="confirm-icon" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" stroke="#3f8f5f" stroke-width="2"/><path d="M7 12.5l3 3 7-7" stroke="#3f8f5f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
<h2 style="font-size:28px;">You're on the schedule</h2>
<p style="color:#666;">${escapeHtml(serviceNames(b.serviceIds) || 'Service')} on ${dateLabel(b.date).dow} ${dateLabel(b.date).dom} at ${fmtTimeMin(b.timeMin)}. A confirmation was noted for ${escapeHtml(b.email||b.phone)}.</p>
<button class="btn btn-ghost" onclick="resetBooking()">Book another job</button>
</div>`;
}

function renderCustomForm(){
const f = state.customForm;
const ready = f.description && f.location && f.name && (f.email || f.phone);
return `
<div class="step-label"><div class="step-num">2</div><h2>Tell us about the job</h2></div>
<div class="form-grid">
<div class="full"><label>What do you need done?</label><textarea oninput="updateCustomForm('description',this.value)">${escapeHtml(f.description)}</textarea></div>
<div class="full"><label>Property address / location</label><input type="text" value="${escapeAttr(f.location)}" oninput="updateCustomForm('location',this.value)"></div>
<div><label>Preferred date (optional)</label><input type="date" value="${f.preferredDate}" onchange="updateCustomForm('preferredDate',this.value)"></div>
<div><label>Preferred time (optional)</label><input type="time" value="${f.preferredTime}" onchange="updateCustomForm('preferredTime',this.value)"></div>
<div><label>Your name</label><input type="text" value="${escapeAttr(f.name)}" oninput="updateCustomForm('name',this.value)"></div>
<div><label>Phone</label><input type="tel" value="${escapeAttr(f.phone)}" oninput="updateCustomForm('phone',this.value)"></div>
<div class="full"><label>Email</label><input type="email" value="${escapeAttr(f.email)}" oninput="updateCustomForm('email',this.value)"></div>
</div>
<div class="btn-row">
<button class="btn btn-primary" ${ready?'':'disabled'} onclick="sendCustomRequest()">Send Request</button>
<button class="btn btn-ghost" onclick="toggleCustomMode()">Cancel</button>
</div>
<div class="demo-note">This opens an email to hello@surface-level.com with your details filled in — just hit send. We'll reply to say whether we can take the job, the price, and confirm a date and time. If you'd rather just pick a slot yourself, leave preferred date/time blank and mention "flexible" in the description.</div>
`;
}

function renderCustomConfirmation(){
const r = state.lastCustomRequest;
return `
<div class="confirm-box">
<svg class="confirm-icon" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" stroke="#3f8f5f" stroke-width="2"/><path d="M7 12.5l3 3 7-7" stroke="#3f8f5f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
<h2 style="font-size:26px;">Request sent</h2>
<p style="color:#666;">Your email to hello@surface-level.com should be ready to send (or already sent). We'll get back to you at ${escapeHtml(r.email||r.phone)} with pricing and to confirm timing.</p>
<button class="btn btn-ghost" onclick="resetCustom()">Submit another request</button>
</div>`;
}

function renderContact(){
return `
<div class="hero">
<h1 style="font-size:34px;">Get in touch</h1>
<p>Questions about a job, pricing, or scheduling? Reach us directly — we're happy to help.</p>
<div class="area-badge"><span class="dot"></span>Serving Thompson's Station, Spring Hill &amp; Franklin — Middle TN</div>
</div>
<div class="contact-box">
<div class="eyebrow">Email</div>
<div class="email">hello@surface-level.com</div>
<a class="btn btn-primary" href="mailto:hello@surface-level.com">Email us</a>
<p style="font-size:12px;color:#999;margin-top:22px;">For a standard job, use Book a Job. For commercial properties or something out of the ordinary, use the Commercial / Custom Job option on the booking page.</p>
</div>`;
}

function renderAdmin(){
if(!DATA.pin){
return `
<div class="pin-gate">
<h2>Set up your dashboard</h2>
<p style="font-size:13px;color:#777;">Create a 4+ digit PIN. You'll use it to log in and manage your schedule, services, and bookings.</p>
<label>New PIN</label><input type="text" maxlength="8" value="${escapeAttr(state.admin.newPinA)}" oninput="state.admin.newPinA=this.value">
<label style="margin-top:10px;">Confirm PIN</label><input type="text" maxlength="8" value="${escapeAttr(state.admin.newPinB)}" oninput="state.admin.newPinB=this.value">
<div class="btn-row" style="justify-content:center;"><button class="btn btn-primary" onclick="setPin()">Save PIN</button></div>
</div>`;
}
if(!state.admin.unlocked){
return `
<div class="pin-gate">
<h2>Business Dashboard</h2>
<p style="font-size:13px;color:#777;">Enter your PIN</p>
<input type="text" maxlength="8" value="${escapeAttr(state.admin.pinInput)}" oninput="state.admin.pinInput=this.value">
<div class="btn-row" style="justify-content:center;"><button class="btn btn-primary" onclick="tryUnlock()">Unlock</button></div>
</div>`;
}

let html = `<div class="step-label"><h2>Weekly hours</h2></div>
<div class="admin-card">`;
DAY_KEYS.forEach((k,i)=>{
const h = DATA.hours[k];
html += `<div class="hours-row">
<span>${DAY_LABELS[i]}</span>
<label class="toggle"><input type="checkbox" ${h.open?'checked':''} onchange="toggleDay('${k}',this.checked)"><span class="slider"></span></label>
${h.open ? `<input type="time" value="${h.start}" onchange="updateHour('${k}','start',this.value)">
<input type="time" value="${h.end}" onchange="updateHour('${k}','end',this.value)">` : `<span style="color:#aaa;">Closed</span><span></span>`}
</div>`;
});
html += `</div>`;

html += `<div class="step-label"><h2>Blocked dates</h2></div>
<div class="admin-card">
<div style="display:flex; gap:8px; align-items:flex-end;">
<div><label>Add a date off</label><input type="date" value="${state.admin.newBlockDate}" onchange="state.admin.newBlockDate=this.value"></div>
<button class="btn btn-ghost" onclick="addBlockedDate()">Add</button>
</div>
<div style="margin-top:10px;">
${DATA.blocked.length===0 ? '<span style="font-size:13px;color:#999;">No blocked dates.</span>' :
DATA.blocked.map(d=>`<span class="blocked-chip">${d}<button onclick="removeBlockedDate('${d}')">&times;</button></span>`).join('')}
</div>
</div>`;

html += `<div class="step-label"><h2>Services &amp; pricing</h2></div>
<div class="admin-card">
<div class="svc-edit-row" style="font-weight:700;color:#999;text-transform:uppercase;font-size:11px;">
<span>Name</span><span>Description</span><span>Price</span><span>Hrs</span><span>Payment link (optional)</span><span></span>
</div>`;
DATA.services.forEach(s=>{
html += `<div class="svc-edit-row">
<input type="text" value="${escapeAttr(s.name)}" onchange="editService('${s.id}','name',this.value)">
<input type="text" value="${escapeAttr(s.desc)}" onchange="editService('${s.id}','desc',this.value)">
<input type="text" value="${s.price}" onchange="editService('${s.id}','price',this.value)">
<input type="text" value="${s.duration}" onchange="editService('${s.id}','duration',this.value)">
<input type="text" placeholder="https://" value="${escapeAttr(s.link)}" onchange="editService('${s.id}','link',this.value)">
<button class="btn-danger" onclick="deleteService('${s.id}')">Remove</button>
</div>`;
});
html += `<div class="btn-row"><button class="btn btn-ghost" onclick="addService()">+ Add service</button></div>
<div class="demo-note">Paste a payment link (e.g. a PayPal Pay Link, Squarespace Pay Link, or Stripe Payment Link) here to take real payments for that service. Leave blank to use the built-in demo checkout. Combined/add-on bookings can't use a single link automatically — those get held and you'll send a matching payment link for the total afterward.</div>
</div>`;

html += `<div class="step-label"><h2>Commercial / custom requests</h2></div>
<div class="admin-card">`;
if(DATA.customRequests.length===0){
html += `<span style="font-size:13px;color:#999;">No custom requests yet.</span>`;
} else {
html += `<table class="bookings"><thead><tr><th>Received</th><th>Details</th><th>Contact</th><th>Preferred</th><th>Status</th><th></th></tr></thead><tbody>`;
DATA.customRequests.slice().reverse().forEach(r=>{
html += `<tr>
<td>${new Date(r.createdAt).toLocaleDateString()}</td>
<td style="max-width:220px;">${escapeHtml(r.description)}<br><span style="color:#999;">${escapeHtml(r.location)}</span></td>
<td>${escapeHtml(r.name)}<br><span style="color:#999;">${escapeHtml(r.phone)}${r.phone&&r.email?' · ':''}${escapeHtml(r.email)}</span></td>
<td>${r.preferredDate || 'Flexible'} ${r.preferredTime||''}</td>
<td><select onchange="updateCustomStatus('${r.id}',this.value)">
${['new','quoted','scheduled','declined'].map(s=>`<option value="${s}" ${r.status===s?'selected':''}>${s}</option>`).join('')}
</select></td>
<td><button class="btn-danger" onclick="deleteCustomRequest('${r.id}')">Remove</button></td>
</tr>`;
});
html += `</tbody></table>`;
}
html += `</div>`;

const upcoming = DATA.bookings.filter(b=>b.status!=='cancelled').sort((a,b)=> (a.date+a.timeMin).localeCompare(b.date+b.timeMin));
html += `<div class="step-label"><h2>Upcoming bookings</h2></div>
<div class="admin-card">`;
if(upcoming.length===0){
html += `<span style="font-size:13px;color:#999;">No bookings yet.</span>`;
} else {
html += `<table class="bookings"><thead><tr><th>Date</th><th>Time</th><th>Service(s)</th><th>Customer</th><th>Address</th><th>Total</th><th>Status</th><th></th></tr></thead><tbody>`;
upcoming.forEach(b=>{
html += `<tr>
<td>${b.date}</td><td>${fmtTimeMin(b.timeMin)}</td><td>${escapeHtml(serviceNames(b.serviceIds))}</td>
<td>${escapeHtml(b.name)}<br><span style="color:#999;">${escapeHtml(b.phone)}</span></td>
<td>${escapeHtml(b.address)}</td>
<td>${fmtMoney(b.price)}</td>
<td><span class="status-pill status-${b.status==='confirmed'?'confirmed':(b.status==='pending-payment'?'pending':'cancelled')}">${b.status}</span></td>
<td><button class="btn-danger" onclick="cancelBooking('${b.id}')">Cancel</button></td>
</tr>`;
});
html += `</tbody></table>`;
}
html += `</div>`;

return html;
}

function pickService(id){
state.customMode = false;
const i = state.selectedServiceIds.indexOf(id);
if(i>=0) state.selectedServiceIds.splice(i,1);
else state.selectedServiceIds.push(id);
state.selectedDate=null; state.selectedSlot=null;
render();
}
function toggleCustomMode(){
state.customMode = !state.customMode;
if(state.customMode){ state.selectedServiceIds=[]; state.selectedDate=null; state.selectedSlot=null; }
render();
}
function pickDate(d){ state.selectedDate=d; state.selectedSlot=null; render(); }
function pickSlot(t){ state.selectedSlot=t; render(); }
function updateForm(field,val){ state.form[field]=val; }
function updateCustomForm(field,val){ state.customForm[field]=val; }

async function commitBooking(status){
const selected = getSelectedServices();
const b = {
id: 'bk_'+Date.now(),
serviceIds: selected.map(s=>s.id),
date: state.selectedDate,
timeMin: state.selectedSlot,
durationHours: totalDuration(),
price: totalPrice(),
discount: discountAmount(),
name: state.form.name, phone: state.form.phone, email: state.form.email,
address: state.form.address, notes: state.form.notes,
status
};
DATA.bookings.push(b);
await saveBookings();
state.lastBooking = b;
render();
}
function payDemo(){ commitBooking('confirmed'); }
function payViaLink(){
const svc = getSelectedServices()[0];
window.open(svc.link, '_blank');
commitBooking('pending-payment');
}
function requestPaymentLink(){ commitBooking('pending-payment'); }
function resetBooking(){
state.selectedServiceIds=[]; state.customMode=false; state.selectedDate=null; state.selectedSlot=null;
state.form={name:'',phone:'',email:'',address:'',notes:''};
state.lastBooking=null;
render();
                           }

async function sendCustomRequest(){
const f = state.customForm;
const req = {
id:'cr_'+Date.now(),
description:f.description, location:f.location, preferredDate:f.preferredDate, preferredTime:f.preferredTime,
name:f.name, phone:f.phone, email:f.email, status:'new', createdAt:new Date().toISOString()
};
DATA.customRequests.push(req);
await saveCustomRequests();
const subject = encodeURIComponent('Custom Job Request — '+f.name);
const bodyLines = [
'Job description: '+f.description,
'Location: '+f.location,
'Preferred date/time: '+(f.preferredDate || 'flexible')+' '+(f.preferredTime||''),
'',
'Name: '+f.name,
'Phone: '+f.phone,
'Email: '+f.email
];
const body = encodeURIComponent(bodyLines.join('\n'));
window.open('mailto:hello@surface-level.com?subject='+subject+'&body='+body, '_blank');
state.lastCustomRequest = req;
render();
}
function resetCustom(){
state.customForm = { description:'', location:'', preferredDate:'', preferredTime:'', name:'', phone:'', email:'' };
state.lastCustomRequest = null;
state.customMode = false;
render();
}

async function setPin(){
if(state.admin.newPinA.length<4 || state.admin.newPinA!==state.admin.newPinB){
alert('PINs must match and be at least 4 characters.'); return;
}
DATA.pin = state.admin.newPinA;
await savePin();
state.admin.unlocked = true;
render();
}
function tryUnlock(){
if(state.admin.pinInput === DATA.pin){ state.admin.unlocked = true; render(); }
else alert('Incorrect PIN');
}
async function toggleDay(k,open){ DATA.hours[k].open = open; await saveHours(); render(); }
async function updateHour(k,field,val){ DATA.hours[k][field]=val; await saveHours(); render(); }
async function addBlockedDate(){
if(!state.admin.newBlockDate) return;
if(!DATA.blocked.includes(state.admin.newBlockDate)) DATA.blocked.push(state.admin.newBlockDate);
state.admin.newBlockDate='';
await saveBlocked(); render();
}
async function removeBlockedDate(d){ DATA.blocked = DATA.blocked.filter(x=>x!==d); await saveBlocked(); render(); }
async function editService(id,field,val){
const s = getService(id);
if(field==='price'||field==='duration') val = parseFloat(val)||0;
s[field]=val; await saveServices(); render();
}
async function addService(){
DATA.services.push({id:'svc_'+Date.now(), name:'New service', desc:'Description', price:50, duration:1, link:''});
await saveServices(); render();
}
async function deleteService(id){
DATA.services = DATA.services.filter(s=>s.id!==id);
await saveServices(); render();
}
async function cancelBooking(id){
const b = DATA.bookings.find(x=>x.id===id);
if(b){ b.status='cancelled'; await saveBookings(); render(); }
}
async function updateCustomStatus(id,val){
const r = DATA.customRequests.find(x=>x.id===id);
if(r){ r.status=val; await saveCustomRequests(); render(); }
}
async function deleteCustomRequest(id){
DATA.customRequests = DATA.customRequests.filter(x=>x.id!==id);
await saveCustomRequests(); render();
}

function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }

(async function init(){
await loadData();
render();
})();
</script>
</body>
</html>
